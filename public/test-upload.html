<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImgBB Upload Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 2px dashed #667eea;
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 20px;
        }
        
        .upload-area:hover {
            background: #f0f2ff;
            border-color: #764ba2;
        }
        
        .upload-area.dragover {
            background: #e8ebff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        
        .upload-area input[type="file"] {
            display: none;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .upload-text {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 12px;
        }
        
        input[type="file"] {
            display: block;
            margin-bottom: 20px;
        }
        
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-size: 14px;
        }
        
        .status.loading {
            display: block;
            background: #e3f2fd;
            color: #1976d2;
            border-left: 4px solid #1976d2;
        }
        
        .status.success {
            display: block;
            background: #e8f5e9;
            color: #388e3c;
            border-left: 4px solid #388e3c;
        }
        
        .status.error {
            display: block;
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #c62828;
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 6px;
            display: none;
        }
        
        .result.show {
            display: block;
        }
        
        .result-label {
            color: #666;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        
        .result-value {
            color: #333;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            background: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        
        .result-value:last-child {
            margin-bottom: 0;
        }
        
        .result-image {
            margin-top: 15px;
            text-align: center;
        }
        
        .result-image img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 6px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }
        
        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
        }
        
        .copy-btn:hover {
            background: #764ba2;
        }
        
        .api-key-info {
            background: #fffbea;
            border-left: 4px solid #ffc107;
            padding: 12px;
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ ImgBB Upload Test</h1>
        <p class="subtitle">Direct API testing - no backend needed</p>
        
        <div class="api-key-info">
            ✅ Using your ImgBB API key directly<br>
            Free tier: unlimited uploads, 32MB per image
        </div>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📤</div>
            <div class="upload-text">Drop image here or click to select</div>
            <div class="upload-hint">PNG, JPG, GIF, WebP (max 32MB)</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <button id="uploadBtn" onclick="uploadImage()">Upload to ImgBB</button>
        
        <div id="status" class="status"></div>
        
        <div id="result" class="result">
            <div class="result-label">✅ Upload Successful!</div>
            <div class="result-label">Image URL</div>
            <div class="result-value" id="imageUrl"></div>
            <button class="copy-btn" onclick="copyToClipboard('imageUrl')">Copy URL</button>
            
            <div class="result-label" style="margin-top: 15px;">Display URL</div>
            <div class="result-value" id="displayUrl"></div>
            <button class="copy-btn" onclick="copyToClipboard('displayUrl')">Copy Display URL</button>
            
            <div class="result-image">
                <img id="uploadedImage" src="" alt="Uploaded image">
            </div>
        </div>
    </div>
    
    <script>
        const IMGBB_API_KEY = '69bd79dca2a9c35e7d987580c736319d';
        const IMGBB_API_URL = 'https://api.imgbb.com/1/upload';
        
        let selectedFile = null;
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const result = document.getElementById('result');
        
        // Drag and drop
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                selectedFile = files[0];
                uploadArea.querySelector('.upload-text').textContent = `✅ ${files[0].name}`;
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                selectedFile = e.target.files[0];
                uploadArea.querySelector('.upload-text').textContent = `✅ ${e.target.files[0].name}`;
            }
        });
        
        async function uploadImage() {
            if (!selectedFile) {
                showStatus('Please select an image first', 'error');
                return;
            }
            
            showStatus('⏳ Uploading to ImgBB...', 'loading');
            uploadBtn.disabled = true;
            
            try {
                const formData = new FormData();
                formData.append('image', selectedFile);
                formData.append('key', IMGBB_API_KEY);
                
                const response = await fetch(IMGBB_API_URL, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showStatus('✅ Upload successful!', 'success');
                    displayResult(data.data);
                } else {
                    showStatus(`❌ Error: ${data.error?.message || 'Unknown error'}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            } finally {
                uploadBtn.disabled = false;
            }
        }
        
        function showStatus(message, type) {
            status.textContent = message;
            status.className = `status ${type}`;
        }
        
        function displayResult(data) {
            document.getElementById('imageUrl').textContent = data.url;
            document.getElementById('displayUrl').textContent = data.display_url;
            document.getElementById('uploadedImage').src = data.url;
            result.classList.add('show');
        }
        
        function copyToClipboard(elementId) {
            const element = document.getElementById(elementId);
            const text = element.textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('Copied to clipboard!');
            });
        }
    </script>
</body>
</html>
