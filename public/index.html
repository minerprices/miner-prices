<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MinerPrices - ASIC Miner Profitability</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #fff;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        h1 {
            color: #FFD700;
            margin-bottom: 20px;
            text-align: center;
            font-size: 32px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: #1a1a1a;
            padding: 20px;
            border: 1px solid #333;
            border-radius: 8px;
            text-align: center;
        }
        
        .stat-box h3 {
            color: #FFD700;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        .stat-box .value {
            font-size: 28px;
            font-weight: bold;
            color: #4ade80;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
            border: 1px solid #333;
            margin-top: 20px;
        }
        
        th {
            background: #FFD700;
            color: #000;
            padding: 12px;
            text-align: left;
            font-weight: bold;
            font-size: 12px;
        }
        
        td {
            padding: 12px;
            border-bottom: 1px solid #333;
            font-size: 13px;
        }
        
        tr:hover {
            background: #222;
        }
        
        .rank {
            color: #FFD700;
            font-weight: bold;
            width: 50px;
        }
        
        .profit {
            color: #4ade80;
            font-weight: bold;
        }
        
        .algo-tag {
            background: rgba(255, 215, 0, 0.2);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: #FFD700;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        
        .error {
            background: #ef4444;
            color: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            table {
                font-size: 11px;
            }
            
            td, th {
                padding: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛏️ MinerPrices - Live ASIC Miner Profitability</h1>
        
        <div class="stats">
            <div class="stat-box">
                <h3>Total Miners</h3>
                <div class="value" id="minerCount">Loading...</div>
            </div>
            <div class="stat-box">
                <h3>Top Daily Profit</h3>
                <div class="value" id="topProfit">Loading...</div>
            </div>
            <div class="stat-box">
                <h3>BTC Price</h3>
                <div class="value" id="btcPrice">Loading...</div>
            </div>
            <div class="stat-box">
                <h3>Last Updated</h3>
                <div class="value" id="lastUpdate">Loading...</div>
            </div>
        </div>
        
        <div id="table-container">
            <div class="loading">🔄 Loading miners from database...</div>
        </div>
    </div>

    <script>
        // Hardcoded API data as fallback
        const hardcodedMiners = [
            { id: 1, name: "Antminer Z15 Pro", algorithm: "Equihash", coin: "ZEC", hashrate: 840000, power: 2780, daily_profit: 421.13, monthly_profit: 12633.90, yearly_profit: 153742.45, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 2, name: "Antminer Z15", algorithm: "Equihash", coin: "ZEC", hashrate: 420000, power: 1510, daily_profit: 210.34, monthly_profit: 6310.20, yearly_profit: 76754.10, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 3, name: "Antminer S23 Hyd 3U", algorithm: "SHA-256", coin: "BTC", hashrate: 1160000000000000, power: 11020, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 4, name: "Whatsminer M79S", algorithm: "SHA-256", coin: "BTC", hashrate: 1350000000000000, power: 20000, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 5, name: "Antminer S21e XP Hyd 3U", algorithm: "SHA-256", coin: "BTC", hashrate: 860000000000000, power: 11180, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 6, name: "Antminer S23e Hyd 2U", algorithm: "SHA-256", coin: "BTC", hashrate: 865000000000000, power: 8650, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 7, name: "Antminer S23 Hyd", algorithm: "SHA-256", coin: "BTC", hashrate: 580000000000000, power: 5510, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 8, name: "Bitdeer SealMiner A4 Ultra Hyd", algorithm: "SHA-256", coin: "BTC", hashrate: 886000000000000, power: 8372, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 9, name: "Bitdeer SealMiner A4 Pro Hyd", algorithm: "SHA-256", coin: "BTC", hashrate: 680000000000000, power: 7412, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 10, name: "Antminer S21 Hyd", algorithm: "SHA-256", coin: "BTC", hashrate: 335000000000000, power: 5360, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 11, name: "Antminer S23", algorithm: "SHA-256", coin: "BTC", hashrate: 420000000000000, power: 3360, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 12, name: "Whatsminer M74S", algorithm: "SHA-256", coin: "BTC", hashrate: 860000000000000, power: 8500, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 13, name: "Antminer L7", algorithm: "Scrypt", coin: "LTC", hashrate: 9500000000, power: 3425, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 14, name: "Whatsminer L7", algorithm: "Scrypt", coin: "LTC", hashrate: 9500000000, power: 3400, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 15, name: "iPollo A1 Pro", algorithm: "Scrypt", coin: "LTC", hashrate: 1540000000000, power: 4600, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 16, name: "Antminer S21", algorithm: "SHA-256", coin: "BTC", hashrate: 200000000000000, power: 3010, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 17, name: "Whatsminer M75S", algorithm: "SHA-256", coin: "BTC", hashrate: 620000000000000, power: 6300, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() },
            { id: 18, name: "Whatsminer M7", algorithm: "Scrypt", coin: "DOGE", hashrate: 1300000000000, power: 3800, daily_profit: 0, monthly_profit: 0, yearly_profit: 0, btc_price: 79894, updated_at: new Date().toISOString() }
        ];

        async function loadMiners() {
            try {
                console.log('Starting to load miners...');
                
                // Try to fetch from Supabase
                const response = await fetch(
                    'https://huzfnrgfcxlwvmrkoyge.supabase.co/rest/v1/miners?order=daily_profit.desc',
                    {
                        headers: {
                            'apikey': 'sb_publishable_s5ocl3sDwpefFYuw3V-JEQ_FQzXGTHZ',
                            'Content-Type': 'application/json'
                        }
                    }
                );
                
                console.log('Fetch response status:', response.status);
                const data = await response.json();
                console.log('Data received:', data.length, 'miners');
                
                if (Array.isArray(data) && data.length > 0) {
                    displayMiners(data);
                } else {
                    console.log('No data from Supabase, using hardcoded fallback');
                    displayMiners(hardcodedMiners);
                }
                
            } catch (error) {
                console.error('Error loading miners:', error);
                console.log('Using hardcoded fallback data');
                displayMiners(hardcodedMiners);
            }
        }

        function displayMiners(miners) {
            console.log('Displaying', miners.length, 'miners');
            
            // Update stats
            document.getElementById('minerCount').textContent = miners.length;
            
            if (miners.length > 0) {
                const topMiner = miners[0];
                document.getElementById('topProfit').textContent = '$' + topMiner.daily_profit.toFixed(2);
                document.getElementById('btcPrice').textContent = '$' + (topMiner.btc_price || 79894).toLocaleString();
                
                const updated = new Date(topMiner.updated_at);
                document.getElementById('lastUpdate').textContent = updated.toLocaleTimeString();
            }
            
            // Create table
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th style="width: 40px;">Rank</th>
                            <th>Miner Name</th>
                            <th style="width: 100px;">Algorithm</th>
                            <th style="width: 80px;">Coin</th>
                            <th>Hashrate</th>
                            <th style="width: 80px;">Power (W)</th>
                            <th style="width: 110px;">💰 Daily</th>
                            <th style="width: 110px;">Monthly</th>
                            <th style="width: 110px;">Yearly</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            miners.forEach((miner, i) => {
                html += `
                    <tr style="cursor: pointer;" onclick="window.location.href='/miner.html?id=${miner.id}'">
                        <td class="rank">#${i + 1}</td>
                        <td><strong>${miner.name}</strong></td>
                        <td><span class="algo-tag">${miner.algorithm}</span></td>
                        <td><strong>${miner.coin}</strong></td>
                        <td>${formatHashrate(miner.hashrate)}</td>
                        <td>${miner.power}</td>
                        <td class="profit">$${miner.daily_profit.toFixed(2)}</td>
                        <td class="profit">$${miner.monthly_profit.toFixed(2)}</td>
                        <td class="profit">$${miner.yearly_profit.toFixed(2)}</td>
                    </tr>
                `;
            });
            
            html += `</tbody></table>`;
            document.getElementById('table-container').innerHTML = html;
            console.log('Table rendered successfully');
        }

        function formatHashrate(hashrate) {
            if (!hashrate) return 'N/A';
            if (hashrate >= 1e15) return (hashrate / 1e15).toFixed(2) + ' PH/s';
            if (hashrate >= 1e12) return (hashrate / 1e12).toFixed(2) + ' TH/s';
            if (hashrate >= 1e9) return (hashrate / 1e9).toFixed(2) + ' GH/s';
            if (hashrate >= 1e6) return (hashrate / 1e6).toFixed(2) + ' MH/s';
            return hashrate.toFixed(2) + ' H/s';
        }

        // Load on page load
        window.addEventListener('load', loadMiners);
    </script>
</body>
</html>
